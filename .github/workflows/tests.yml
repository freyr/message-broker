name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ecs:
    name: ECS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
      - run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/ecs check

  # TODO: re-enable a phpstan job once the skeleton's typing TODOs are resolved
  # (level max currently reports draft-grade gaps by design).

  functional-tests:
    name: Functional Tests (MySQL + RabbitMQ)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: message_broker_test
          MYSQL_USER: broker
          MYSQL_PASSWORD: broker
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      rabbitmq:
        image: rabbitmq:4.3.1-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, sockets, mbstring, pcntl
          coverage: none
          tools: composer:v2

      - run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run tests
        env:
          MYSQL_DSN: "mysql:host=127.0.0.1;port=3306;dbname=message_broker_test"
          MYSQL_USER: broker
          MYSQL_PASSWORD: broker
          AMQP_HOST: 127.0.0.1
          AMQP_PORT: "5672"
          AMQP_USER: guest
          AMQP_PASSWORD: guest
          AMQP_VHOST: "/"
        run: vendor/bin/phpunit
