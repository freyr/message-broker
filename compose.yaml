services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - ${COMPOSER_HOME}:/.composer:consistent
    environment:
      MYSQL_DSN: "mysql:host=mysql;port=3306;dbname=message_broker_test"
      MYSQL_USER: broker
      MYSQL_PASSWORD: broker
      POSTGRES_DSN: "pgsql:host=postgres;port=5432;dbname=message_broker_test"
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: broker
      AMQP_HOST: rabbitmq
      AMQP_PORT: "5672"
      AMQP_USER: guest
      AMQP_PASSWORD: guest
      AMQP_VHOST: "/"
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: message_broker_test
      MYSQL_USER: broker
      MYSQL_PASSWORD: broker
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: message_broker_test
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: broker
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broker -d message_broker_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mysql_data:
  postgres_data:
  rabbitmq_data:

